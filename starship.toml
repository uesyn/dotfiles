add_newline = false
format = """
[┌─](fg:#a89984) $username$directory$git_branch$git_commit$git_status$terraform$kubernetes
[└─](fg:#a89984) """

[username]
show_always = true
format = "[$user](fg:#8ec07c) in "

[directory]
style = "fg:#fabd2f"

[git_branch]
only_attached = true
style = "fg:#fe8019"

[git_commit]
tag_disabled = false
style = "fg:#fe8019"
format = "on [ $hash$tag]($style) "

[git_status]
style = "fg:#fe8019"

[kubernetes]
style = "fg:#83a598"
format = "on [$symbol$context]($style) "
disabled = false
